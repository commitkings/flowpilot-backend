name: CI / Build and Push

on:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "scripts/**"
      - "requirements.txt"
      - "Dockerfile"

  workflow_dispatch:

env:
  HARBOR_REGISTRY: 164.68.119.226:30002
  HARBOR_PROJECT: flowpilot
  MANIFESTS_REPO: commitkings/flow-pilot-infra

jobs:

  deploy:
    name: Build and Deploy
    runs-on: [self-hosted, flow-pilot]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate app version tag
        id: version
        run: |
          VERSION="1.0.${GITHUB_RUN_NUMBER}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"

      - name: Sync files to deployment directory
        run: |
          sudo rsync -avzr --delete ./ /home/github/flowpilot-backend

      - name: Docker Login to Harbor
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ env.HARBOR_REGISTRY }} \
            --username '${{ secrets.HARBOR_USERNAME }}' \
            --password-stdin

      - name: Build and Push Flow Pilot Backend
        env:
          DOCKER_BUILDKIT: 1
        run: |
          IMAGE="${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/flowpilot-backend"
          docker pull $IMAGE:latest || true
          docker build \
            --cache-from $IMAGE:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t $IMAGE:${{ steps.version.outputs.version }} \
            -t $IMAGE:latest
          docker push $IMAGE:${{ steps.version.outputs.version }}
          docker push $IMAGE:latest


