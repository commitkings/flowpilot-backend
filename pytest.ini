[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests

# Output
addopts = -v --tb=short

# Coverage (optional)
# addopts = -v --tb=short --cov=src --cov=app --cov-report=term-missing
