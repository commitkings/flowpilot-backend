version: "3.8"

services:
  flowpilot:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: oracle
      POSTGRES_DB: flowpilot
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
